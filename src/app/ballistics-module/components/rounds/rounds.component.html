<div *ngIf='_rounds' class="panel panel-primary">
	<div class="panel-heading clearfix" data-toggle="collapse" (click)='isOpen=!isOpen'>
		<div class="panel-title pull-left">Select Round</div>
		<i class="fa fa-fw pull-right" [class.fa-chevron-up]='!isOpen' [class.fa-chevron-down]='isOpen'></i>
	</div>
	<div class="panel-collapse collapse" [class.in]="isOpen">
			<div class="panel-body">
			<ul class="list-inline">
				<li *ngFor='let round of _rounds' (click)='select(round);' class='card' >
					<div class="well" [class.active]='currentRound===round'>
						{{ round.name }}
					</div>
				</li>
			</ul>
		</div>
		<div class="panel-footer">
			<button class="btn btn-lg btn-default" (click)='add();'><span class="fa fa-plus"></span> Add Round</button>
		</div>
	</div>
</div>
