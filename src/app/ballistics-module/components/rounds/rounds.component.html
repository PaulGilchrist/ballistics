<div *ngIf='_rounds' class="card">
    <div class="card-heading bg-dark text-light clearfix p-2">
		Select Round
	</div>
	<div class="card-body">
		<ul class="list-inline">
			<li *ngFor='let round of _rounds' (click)='select(round);' class='card' >
				<div class="well" [class.active]='currentRound===round'>
					{{ round.name }}
				</div>
			</li>
		</ul>
	</div>
	<div class="card-footer">
		<button class="btn btn-default" (click)='add();'><span class="fa fa-plus"></span> Add Round</button>
	</div>
</div>
