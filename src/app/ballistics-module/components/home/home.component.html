<div class='home'>
    <div>
        <label class="btn btn-info" (change)="importData($event)">
            Import <input type="file" multiple="false" accept=".json" hidden>
        </label>
        &nbsp;
        <label class="btn btn-info" (click)="exportData()">Export</label>
    </div>
    <div class="d-flex flex-row flex-wrap justify-content-center">
        <app-weather></app-weather>
        <app-target></app-target>
        <app-firearms></app-firearms>
        <app-firearm></app-firearm>
        <app-rounds></app-rounds>
        <app-round></app-round>
    </div>
    <div *ngIf='ranges != null && ranges.length>0'>
        <app-chart class="d-flex flex-fill justify-content-center"></app-chart>
		<br/>
        <button class='btn btn-success'(click)="graphType==='line' ? graphType='bar' : graphType='line'">Change Graph Type</button>
        <div class="d-flex flex-fill flex-row flex-wrap justify-content-around">
            <div class="graph-inline">
                <h4>Velocity (feet/sec)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="velocityFPS" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='0'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Energy (foot pounds)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="energyFtLbs" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='0'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Time (seconds)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="timeSeconds" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='2'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Drop (inches)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="dropInches" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='1'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Elevation (inches)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="verticalPositionInches" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='1'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Cross Wind Drift (inches)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="crossWindDriftInches" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='1'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Lead (inches)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="leadInches" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='1'></app-d3-graph>
            </div>
            <div class="graph-inline">
                <h4>Slant (inches - hold low)</h4>
                <app-d3-graph [type]="graphType" [data]="ranges" xKey="rangeYards" yKey="slantDropInches" [width]="graphWidth" [height]="graphHeight" labels='none' [yToFixed]='1'></app-d3-graph>
            </div>
        </div>
    </div>
</div>
