<div class='home'>
    <div>
        <div class='panel'><weather [isOpen]='isWeatherOpen'></weather></div>
        <div class='panel'><target [isOpen]='isTargetOpen'></target></div>
        <div class='panel'><firearms *ngIf='dataService.firearms' [firearms]='dataService.firearms' [isOpen]='isFirearmsOpen' (onSelect)='onFirearmSelected($event);'></firearms></div>
        <div class='panel'><firearm *ngIf='dataService.currentFirearm' [firearm]='dataService.currentFirearm' [isOpen]='isFirearmOpen' (onChange)='onFirearmChange();' (onSave)='onFirearmEdited($event);'></firearm></div>
        <div class='panel'><rounds *ngIf='dataService.currentFirearm' [isOpen]='isRoundsOpen' [rounds]='dataService.currentFirearm.rounds' (onSelect)='onRoundSelected($event);'></rounds></div>
        <div class='panel'><round *ngIf='dataService.currentRound' [round]='dataService.currentRound' [isOpen]='isRoundOpen' (onChange)='onRoundChange();' (onSave)='onRoundEdited($event);'></round></div>
    </div>
    <chart *ngIf='dataService.currentRound'></chart>
</div>
