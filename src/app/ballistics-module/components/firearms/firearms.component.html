<div *ngIf='_firearms' class="panel panel-primary">
	<div class="panel-heading clearfix" data-toggle="collapse" (click)='isOpen=!isOpen'>
		<div class="panel-title pull-left">Select Firearm</div>
		<i class="fa fa-fw pull-right" [class.fa-chevron-up]='!isOpen' [class.fa-chevron-down]='isOpen'></i>
	</div>
	<div class="panel-collapse collapse" [class.in]="isOpen">
		<div class="panel-body">
			<ul class="list-inline">
				<li *ngFor='let firearm of _firearms' (click)='select(firearm);' class='card'>
					<div class="well" [class.active]='currentFirearm===firearm'>
						{{ firearm.name }}
					</div>
				</li>
			</ul>
		</div>
		<div class="panel-footer">
			<button class="btn btn-default" (click)='add();'><span class="fa fa-plus"></span> Add Firearm</button>
		</div>
	</div>
</div>
